<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Koda Development - Creative 3D and Web</title>
    <link rel="stylesheet" href="style.css">
       <link rel="stylesheet" type="text/css" href="custom.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
    <style>
        body,
        h1 {
            font-family: "Roboto", sans-serif
        }

        body,
        html {
            height: 100%
        }

        .bgcolor {
            background: #512d6d;
            min-height: 100%;
            background-position: center;
            background-size: cover;
            animation-name: colormv;
            animation-duration: 3s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        @keyframes colormv {
            from {
				background-color:#000;
			}
			to {
				background-color:#512d6d;
			}
        }

        .logo {
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="bgcolor w3-display-container w3-animate-opacity w3-text-white">
       <!--Navigation-->
     <!-- Side Navbar -->
        <div class="w3-sidebar w3-bar-block w3-border-right w3-animate-left" style="display:none; z-index:100;"id="mySidebar">
            <button onclick="w3_close()" class="w3-bar-item w3-xxlarge w3-center">Close &times;</button>
            <a href="/cv" onclick="w3_close()" class="w3-bar-item w3-button w3-xxlarge w3-center">about</a>
            <a href="#services" onclick="w3_close()" class="w3-bar-item w3-button w3-xxlarge w3-center">services</a>
            <a href="#services" onclick="w3_close()" class="w3-bar-item w3-button w3-xxlarge w3-center">pricing</a>
            <a href="/portfolio" class="w3-bar-item w3-button w3-xxlarge w3-center">work</a>
            <a href="#contact" onclick="w3-close()" class="w3-bar-item w3-button w3-xxlarge w3-center">contact</a>
        </div>
        <div class="w3-top">

            <button class="w3-button w3-black w3-large" style="box-shadow: 10px 1px 10px grey;"
                onclick="w3_open()">menu</button>
        </div>
       <!--End Navigation-->

        <div class="w3-display-middle">
            <!--<img src="images/kodalogo.svg" alt="Koda Dev" class="w3-image animate-top logo">-->
            <object data="images/kodalogo.svg" class="logo"> </object>
        </div>
        <div class="w3-display-bottommiddle"><h3 class="w3-opacity w3-center">Full Stack Web Development |  3D Visuals and Modeling</h3></div>
    </div>

<script>
        //side navbar
        function w3_open() {
            document.getElementById("mySidebar").style.display = "block";
        }

        function w3_close() {
            document.getElementById("mySidebar").style.display = "none";
        }
    </script>
    <script>
        < script src = "/static/js/scroll-down.js" >
    </script>
   
</body>

</html>
